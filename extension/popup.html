<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- No remote fonts: NaraVault makes no external network calls. The CSS uses
         system-font fallbacks (Space Grotesk / JetBrains Mono if locally installed). -->
    <link rel="stylesheet" href="popup.css" />
    <title>NaraVault</title>
  </head>
  <body>
    <div class="popup">
      <header class="pop-head">
        <div class="brand">
          <div class="brand-mark" style="width: 24px; height: 24px">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <span class="brand-name">Nara<span class="brand-vault">Vault</span></span>
        </div>
        <div class="pop-head-actions">
          <button class="icon-btn" id="refreshBtn" title="Refresh">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
        </div>
      </header>

      <main class="pop-body cscroll" id="app"></main>

      <footer class="pop-foot">
        <button id="tabVault" class="is-active">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
          <span>Vault</span>
        </button>
        <button id="tabCards">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
          <span>Cards</span>
        </button>
        <button id="tabGen">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.85 12.15 19 4"/><path d="M18 5l2 2"/><path d="M15 8l2 2"/></svg>
          <span>Generator</span>
        </button>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
